<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSorteio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
        <img src="./assets/bf9005e4ea371946d39627b79e08544906437e6f.png" alt="Logo-sorteador">

        <h2>Sortear um numero</h2>
    <div>
        <input type="number" placeholder="entre" class="input-min">
        <input type="number" placeholder="e" class="input-max"">
    </div>
    
        <button class="sortear-button">Sortear</button>


    <!-- Caixa do resulyado -->
        <div class="modal-overlay" id="overlay">
        <div class="caixa-resultado">
            <h2 class="msg-result">Seu numero sorteado é:</h2>
            <p class="Numero-Sorteado">50</p>
            <button class="fecharBtn">Fechar</button>
        </div>
    </div>


        <script src="./script.js"></script>
</body>
</html>
